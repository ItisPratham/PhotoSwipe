name: PhotoSwipe

# Non-compiled files surfaced in the Xcode navigator (repo-root docs/config).
fileGroups:
  - PhotoSwipe_Instructions.md
  - README.md
  - project.yml
  - .gitignore

options:
  bundleIdPrefix: com.phototinder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "3.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
    DEVELOPMENT_TEAM: 3N3526X38B

targets:
  PhotoSwipe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhotoSwipe
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PhotoSwipe/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.phototinder.PhotoSwipe
        PRODUCT_NAME: PhotoSwipe
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
